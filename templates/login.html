{% extends "base.html" %}
{% block title %}Ingresar - Fichas Técnicas{% endblock %}
{% block content %}
<div class="login-box card p-4">
  <div class="text-center mb-3">
    <i class="bi bi-shield-lock" style="font-size:2rem;color:#1F4E79;"></i>
    <h5 class="mt-2 mb-0">Fichas Técnicas</h5>
    <small class="text-muted">Ingresa la clave de acceso</small>
  </div>
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Clave</label>
      <input type="password" name="password" class="form-control" autofocus required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Entrar</button>
  </form>
</div>
{% endblock %}
