<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Fichas Técnicas - Intela{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f0f4f8; }
    .navbar-intela { background: #1F4E79; }
    .navbar-intela .brand { color: #fff; font-weight: 700; }
    .card { border: none; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,.08); }
    .ficha-card { transition: box-shadow .15s ease; }
    .ficha-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.14); }
    .familia-badge { background:#1F4E79; color:#fff; font-size:.7rem; padding:2px 8px; border-radius:4px; }
    .login-box { max-width: 380px; margin: 10vh auto; }
  </style>
</head>
<body>
  <nav class="navbar navbar-intela">
    <div class="container">
      <span class="brand"><i class="bi bi-file-earmark-text me-2"></i>Fichas Técnicas - Intela</span>
      {% if session.get('auth') %}
      <a class="btn btn-sm btn-outline-light" href="{{ url_for('logout') }}"><i class="bi bi-box-arrow-right me-1"></i>Salir</a>
      {% endif %}
    </div>
  </nav>
  <div class="container my-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show py-2" role="alert">
        {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
